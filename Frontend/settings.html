<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySprint - Settings</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: stretch;
        }
        .settings-group {
            height: auto !important;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-card);
            padding: 28px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
        }
        #save-settings-btn {
            background-color: #06b6d4;
            color: white;
            margin-top: auto;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #save-settings-btn:hover {
            background-color: #0891b2;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="sidebar-placeholder"></div>
    <main class="main">
        <div id="header-placeholder"></div>
        <section class="page active">
            <div class="page-header"><h1>Settings</h1><p>Customize your experience</p></div>
            <div class="settings-grid">
                <div class="settings-group">
                    <div class="group-header">Profile</div>
                    <div class="settings-item">
                        <label>Full Name</label>
                        <input type="text" id="settings-name">
                    </div>
                    <div class="settings-item">
                        <label>Email Address</label>
                        <input type="email" id="settings-email">
                    </div>
                </div>
                <div class="settings-group">
                    <div class="group-header">Timer Configuration</div>
                    <div class="settings-item">
                        <label>Focus Duration (min)</label>
                        <input type="number" id="focusTime">
                    </div>
                    <div class="settings-item">
                        <label>Break Duration (min)</label>
                        <input type="number" id="breakTime">
                    </div>
                    <button id="save-settings-btn">Save Settings</button>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="js/loader.js"></script>
<script src="js/api.js"></script>
</body>
</html>
