<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>StudySprint - Settings</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div id="sidebar-placeholder"></div>
    <main class="main">
        <div id="header-placeholder"></div>
        <section class="page active">
            <div class="page-header"><h1>Settings</h1><p>Customize your experience</p></div>
            <div class="settings-grid">
                <div class="settings-group">
                    <div class="group-header">Profile</div>
                    <div class="settings-item"><label>Full Name</label><input type="text" value="John Doe"></div>
                    <div class="settings-item"><label>Email Address</label><input type="email" value="john.doe@university.edu"></div>
                </div>
                <div class="settings-group">
                    <div class="group-header">Timer Configuration</div>
                    <div class="settings-item"><label>Focus Duration (min)</label><input type="number" id="focusTime" value="25"></div>
                    <div class="settings-item"><label>Break Duration (min)</label><input type="number" id="breakTime" value="5"></div>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="js/loader.js"></script>
</body>
</html>
