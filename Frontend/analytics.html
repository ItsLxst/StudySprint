<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySprint - Analytics</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div id="sidebar-placeholder"></div>
    <main class="main">
        <div id="header-placeholder"></div>
        <section class="page active">
            <div class="analytics-header">
                <h1>Analytics Dashboard</h1>
                <select id="analytics-timeframe" class="date-filter" style="border:none; background:none; font-family:inherit; cursor:pointer;">
                    <option value="weekly">Weekly View</option>
                    <option value="monthly">Monthly View</option>
                    <option value="yearly">Yearly View</option>
                </select>
            </div>
            <div class="stats-grid-analytics">
                <div class="stat-card-advanced">
                    <div class="stat-card-header">
                        <div class="stat-card-icon icon-yellow"><i class="fa-regular fa-clock"></i></div>
                        <span class="stat-card-title">Focus Hours</span>
                    </div>
                    <div class="stat-card-value" id="stat-total-focus">0</div>
                    <div class="stat-card-subtext positive" id="focus-trend">+0% This Week</div>
                </div>
                <div class="stat-card-advanced">
                    <div class="stat-card-header">
                        <div class="stat-card-icon icon-blue"><i class="fa-regular fa-circle-check"></i></div>
                        <span class="stat-card-title">Tasks Done</span>
                    </div>
                    <div class="stat-card-value" id="stat-total-tasks">0</div>
                    <div class="stat-card-subtext positive" id="tasks-trend">+0 This Week</div>
                </div>
            </div>
            <div class="charts-grid-analytics">
                <div class="chart-card"><div class="chart-container-wrapper"><canvas id="chart"></canvas></div></div>
                <div class="chart-card"><div class="chart-container-wrapper"><canvas id="tasksCompletedChart"></canvas></div></div>
            </div>
        </section>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/loader.js"></script>
<script src="js/api.js"></script>
</body>
</html>
