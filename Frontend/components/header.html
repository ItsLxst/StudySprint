<header class="top-bar">
    <div class="search-bar">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search tasks, notes, or anything...">
    </div>
    
    <div class="user-actions" style="display: flex; align-items: center; gap: 16px;">
        <div class="user-profile" onclick="location.href='profile.html'" style="cursor: pointer; display: flex; align-items: center; gap: 12px;">
            <div class="user-info">
                <span class="user-name">John Doe</span>
            </div>
            <div class="user-avatar">JD</div>
        </div>

        <div style="width: 1px; height: 24px; background: var(--border);"></div>
        
        <button onclick="location.href='login.html'" title="Logout" style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.1rem; padding: 8px; transition: 0.2s;">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
    </div>
</header>
