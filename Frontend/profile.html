<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySprint - Profile</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .profile-container { display: grid; grid-template-columns: 1fr 2.2fr; gap: 24px; }
        .profile-card, .profile-details { background: var(--bg-card); padding: 32px; border-radius: 20px; box-shadow: var(--shadow-md); }
        .profile-avatar-large { width: 100px; height: 100px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; margin: 0 auto 20px; }
        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
        .streak-badge { background: #fff7ed; color: #9a3412; padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; margin-top: 20px; border: 1px solid #ffedd5; }
    </style>
</head>
<body>
<div class="container">
    <div id="sidebar-placeholder"></div>
    <main class="main">
        <div id="header-placeholder"></div>
        <section class="page active">
            <div class="page-header">
                <h1>My Profile</h1>
                <p>Personalize your experience and track achievements</p>
            </div>
            <div class="profile-container">
                <div class="profile-card">
                    <div class="profile-avatar-large">JD</div>
                    <div style="text-align: center;">
                        <h2 id="display-name">John Doe</h2>
                    </div>
                    <div class="streak-badge"><i class="fa-solid fa-fire"></i> <span id="streak-info">Loading stats...</span></div>
                </div>
                <div class="profile-details">
                    <div class="card-header">Account Information</div>
                    <div class="info-row">
                        <div class="settings-item">
                            <label>Full Name</label>
                            <input type="text" id="profile-name" value="John Doe">
                        </div>
                        <div class="settings-item">
                            <label>Email</label>
                            <input type="email" id="profile-email" value="john.doe@university.edu">
                        </div>
                    </div>
                    <button id="update-profile-btn" class="btn-primary" style="margin-top: 24px; width: auto; padding: 12px 30px;">Update Profile</button>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="js/loader.js"></script>
<script src="js/api.js"></script>
</body>
</html>
