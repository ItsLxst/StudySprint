<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySprint - Dashboard</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div id="sidebar-placeholder"></div>
    <main class="main">
        <div id="header-placeholder"></div>
        <section class="page active">
            <div class="page-header">
                <h1>Welcome back! 👋</h1>
                <p>Ready to crush your goals today?</p>
            </div>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon icon-blue"><i class="fa-regular fa-clock"></i></div>
                    <div class="stat-content">
                        <h3 id="stat-focus-hours">0</h3>
                        <p>Focus Hours Today</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-green"><i class="fa-regular fa-circle-check"></i></div>
                    <div class="stat-content">
                        <h3 id="stat-tasks-completed">0</h3>
                        <p>Tasks Completed</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-orange"><i class="fa-solid fa-bolt"></i></div>
                    <div class="stat-content">
                        <h3 id="stat-streak">0 days</h3>
                        <p>Current Streak</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon icon-purple"><i class="fa-solid fa-chart-line"></i></div>
                    <div class="stat-content">
                        <h3 id="stat-progress">0%</h3>
                        <p>Weekly Progress</p>
                    </div>
                </div>
            </div>
            <div class="dashboard-row">
                <div class="focus-today-card" id="focus-of-the-day-card">
                    <div class="card-header"><i class="fa-solid fa-bolt"></i> Focus of the Day</div>
                    <div class="focus-content" id="focus-task-container">
                        <p>No active tasks. Start by adding one!</p>
                    </div>
                </div>
                <div class="upcoming-card">
                    <div class="card-header"><i class="fa-regular fa-calendar-check"></i> Task List Overview</div>
                    <ul class="deadline-list" id="deadline-list">
                    </ul>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="js/loader.js"></script>
<script src="js/api.js"></script>
</body>
</html>
