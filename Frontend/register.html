<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudySprint - Register</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .auth-body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-main); padding: 20px; }
        .auth-card { background: var(--bg-card); padding: 40px; border-radius: 24px; box-shadow: var(--shadow-md); width: 100%; max-width: 420px; }
        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-header .logo-icon { margin: 0 auto 12px; width: 48px; height: 48px; font-size: 1.5rem; }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon">S</div>
            <h2>Create Account</h2>
            <p>Start your productivity journey today</p>
        </div>
        <form id="registerForm">
            <div class="settings-item"><label>Full Name</label><input type="text" id="regName" placeholder="John Doe" required></div>
            <div class="settings-item"><label>Email Address</label><input type="email" id="regEmail" placeholder="name@university.edu" required></div>
            <div class="settings-item"><label>Password</label><input type="password" id="regPass" placeholder="••••••••" required></div>
            <button type="submit" class="btn-primary" style="margin-top:20px">Join Now</button>
        </form>
        <div class="auth-footer" style="text-align:center; margin-top:20px">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>
    <script src="js/api.js"></script>
</body>
</html>
