<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudySprint - Tasks</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container">
    <div id="sidebar-placeholder"></div>
    <main class="main">
        <div id="header-placeholder"></div>
        <section class="page active">
            <div class="page-header">
                <h1>Tasks & Focus Session</h1>
                <p>Stay productive with the Pomodoro technique</p>
            </div>
            <div class="task-focus-container">
                <div class="pomodoro-card">
                    <div class="modes">
                        <button id="focusBtn" onclick="setMode('focus')" class="active">Focus</button>
                        <button id="breakBtn" onclick="setMode('break')">Break</button>
                    </div>
                    <div class="timer-circle">
                        <div class="timer-time" id="time">25:00</div>
                        <p class="timer-label" id="modeText">FOCUS TIME</p>
                    </div>
                    <div class="timer-controls">
                        <button class="btn-start" onclick="startTimer()"><i class="fa-solid fa-play"></i></button>
                        <button class="btn-reset" onclick="resetTimer()"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>
                <div class="task-list-card">
                    <div class="card-header">Your Tasks</div>
                    <div class="add-task">
                        <input type="text" id="taskInput" placeholder="Add a new task..." onkeypress="if(event.key === 'Enter') addTask()">
                        <button onclick="addTask()"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <ul class="task-items" id="taskList"></ul>
                </div>
            </div>
        </section>
    </main>
</div>
<script src="js/loader.js"></script>
<script src="js/timer.js"></script>
<script src="js/api.js"></script>
<script>window.onload = () => setMode('focus');</script>
</body>
</html>
